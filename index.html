<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom & Petal | Florist Order Management</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Core Theme Variables (Champagne, Moss Green, Charcoal) */
        :root {
            --color-bg: #F7E7CE;          /* Champagne */
            --color-text: #36454F;        /* Soft Charcoal */
            --color-accent: #2F4F4F;      /* Deep Moss Green */
            --color-glass-bg: rgba(255, 255, 255, 0.45);
            --color-glass-border: rgba(255, 255, 255, 0.6);
            --color-glass-shadow: rgba(0, 0, 0, 0.05);
            --color-ring: #2F4F4F;
            --color-btn-bg: #2F4F4F;
            --color-btn-text: #FFFFFF;
            --color-input-bg: rgba(255, 255, 255, 0.6);
        }

        /* VIP Mode Variables (Dark Charcoal & Gold) */
        body.vip-mode {
            --color-bg: #1A1A1A;          /* Dark Charcoal */
            --color-text: #F7E7CE;        /* Champagne text */
            --color-accent: #D4AF37;      /* Gold */
            --color-glass-bg: rgba(40, 40, 40, 0.6);
            --color-glass-border: rgba(212, 175, 55, 0.3);
            --color-glass-shadow: rgba(212, 175, 55, 0.1);
            --color-ring: #D4AF37;
            --color-btn-bg: #D4AF37;
            --color-btn-text: #1A1A1A;
            --color-input-bg: rgba(20, 20, 20, 0.6);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            /* Fast transition for "instant" feel but still smooth */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Glassmorphism Elements */
        .glass-card {
            background: var(--color-glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--color-glass-border);
            box-shadow: 0 10px 40px var(--color-glass-shadow);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .glass-input {
            background: var(--color-input-bg);
            border: 1px solid var(--color-glass-border);
            color: var(--color-text);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--color-ring);
        }

        .accent-text { color: var(--color-accent); transition: color 0.3s ease; }
        .accent-bg { background-color: var(--color-accent); color: var(--color-btn-text); transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* Container Queries & Bento Grid setup */
        .main-container {
            container-type: inline-size;
            container-name: bento;
        }

        .bento-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 1fr;
            grid-template-areas: 
                "header"
                "featured"
                "search"
                "inventory"
                "receipt";
        }

        @container bento (min-width: 900px) {
            .bento-grid {
                grid-template-columns: minmax(0, 7fr) minmax(0, 5fr);
                grid-template-areas: 
                    "header receipt"
                    "featured receipt"
                    "search receipt"
                    "inventory receipt";
            }
        }
        
        @container bento (min-width: 1200px) {
            .bento-grid {
                grid-template-columns: minmax(0, 8fr) minmax(0, 4fr);
            }
        }

        .area-header { grid-area: header; }
        .area-featured { grid-area: featured; }
        .area-search { grid-area: search; }
        .area-inventory { grid-area: inventory; }
        .area-receipt { grid-area: receipt; }

        /* Refined Micro-Interactions */
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 40px var(--color-glass-shadow); }
            50% { transform: scale(1.02); box-shadow: 0 15px 50px var(--color-glass-shadow); }
        }
        
        .breathing {
            animation: breathe 3s ease-in-out infinite;
            border-color: var(--color-ring);
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .slide-in-item {
            animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Scrollbar customization */
        .receipt-scroll::-webkit-scrollbar { width: 6px; }
        .receipt-scroll::-webkit-scrollbar-track { background: transparent; }
        .receipt-scroll::-webkit-scrollbar-thumb { background: var(--color-glass-border); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans antialiased p-4 md:p-8 overflow-x-hidden" id="app-body">
    <div class="max-w-[1600px] mx-auto main-container h-full">
        <div class="bento-grid h-full">
            
            <!-- Header -->
            <header class="area-header flex items-center justify-between glass-card p-6 md:px-10">
                <div>
                    <h1 class="text-3xl md:text-4xl font-serif font-bold flex items-center gap-3">
                        <i data-lucide="flower-2" class="w-8 h-8 accent-text"></i>
                        Bloom & Petal
                    </h1>
                    <p class="text-sm tracking-widest uppercase opacity-70 mt-1 font-medium">Order Management System</p>
                </div>
                <div id="vip-badge" class="hidden items-center gap-2 px-5 py-2.5 rounded-full text-[var(--color-accent)] border border-[var(--color-accent)] font-serif italic shadow-sm transition-all duration-300">
                    <i data-lucide="crown" class="w-4 h-4"></i>
                    VIP Packaging Unlocked
                </div>
            </header>

            <!-- Featured Card -->
            <div class="area-featured" id="featured-area">
                <!-- Injected by JS Component -->
            </div>

            <!-- Search -->
            <div class="area-search glass-card p-4 flex items-center gap-4">
                <i data-lucide="search" class="w-5 h-5 opacity-50 ml-3 accent-text"></i>
                <input type="text" id="search-input" placeholder="Search inventory..." class="glass-input w-full p-4 rounded-xl text-lg focus:outline-none transition-all placeholder-opacity-50">
            </div>

            <!-- Inventory Grid -->
            <div class="area-inventory grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6" id="inventory-area">
                <!-- Injected by JS Component -->
            </div>

            <!-- Receipt / Cart -->
            <div class="area-receipt glass-card flex flex-col h-[700px] @container:h-[calc(100vh-4rem)] sticky top-8">
                <div class="p-8 border-b border-[var(--color-glass-border)] flex justify-between items-center">
                    <h2 class="text-2xl font-serif font-bold flex items-center gap-3 tracking-tight">
                        <i data-lucide="receipt" class="w-6 h-6 accent-text"></i>
                        Live Receipt
                    </h2>
                    <span class="text-xs font-bold uppercase tracking-widest opacity-60">Real-time</span>
                </div>
                
                <div class="flex-grow overflow-y-auto p-8 receipt-scroll space-y-1" id="receipt-items">
                    <!-- Injected by JS Component -->
                </div>

                <div class="p-8 bg-black/5 rounded-b-[1.5rem] border-t border-[var(--color-glass-border)]" id="receipt-totals">
                    <!-- Injected by JS Component -->
                </div>
            </div>

        </div>
    </div>

    <script>
        // System Architecture: Clean App Object with State Proxy
        const App = (() => {
            // High-Performance Array for Static Data
            const inventoryList = [
                { id: 'f1', name: 'White Peony', price: 15.00, initialStock: 12, isFeatured: true, description: 'Lush, voluminous blooms representing romance and prosperity. The crown jewel of any arrangement.' },
                { id: 'f2', name: 'Blush Ranunculus', price: 8.00, initialStock: 25, isFeatured: false, description: 'Delicate, tissue-thin petals with intricate layers.' },
                { id: 'f3', name: 'Dusty Miller', price: 4.00, initialStock: 40, isFeatured: false, description: 'Velvety silver foliage that adds elegant texture.' },
                { id: 'f4', name: 'Juliet Rose', price: 12.00, initialStock: 15, isFeatured: false, description: 'Classic peach garden rose with a sophisticated scent.' },
                { id: 'f5', name: 'Blue Thistle', price: 6.00, initialStock: 20, isFeatured: false, description: 'Textural metallic blue accents for modern contrast.' },
                { id: 'f6', name: 'White Hydrangea', price: 10.00, initialStock: 8, isFeatured: false, description: 'Cloud-like clusters of delicate white blooms.' }
            ];

            // Centralized Application State
            const stateData = {
                searchQuery: '',
                cart: {} // Format: { 'f1': 2, 'f2': 1 }
            };

            // State Proxy for reactive rendering (No messy global vars scattered)
            const state = new Proxy(stateData, {
                set(target, property, value) {
                    target[property] = value;
                    // De-duplicate rapid render calls via animation frame
                    requestAnimationFrame(render); 
                    return true;
                }
            });

            // DOM Element Cache
            const DOM = {
                body: document.getElementById('app-body'),
                featuredArea: document.getElementById('featured-area'),
                inventoryArea: document.getElementById('inventory-area'),
                receiptItems: document.getElementById('receipt-items'),
                receiptTotals: document.getElementById('receipt-totals'),
                searchInput: document.getElementById('search-input'),
                vipBadge: document.getElementById('vip-badge'),
            };

            // Initialize Event Listeners
            DOM.searchInput.addEventListener('input', (e) => {
                state.searchQuery = e.target.value.toLowerCase();
            });

            // Public Actions
            const addToCart = (id) => {
                const item = inventoryList.find(i => i.id === id);
                const currentQty = state.cart[id] || 0;
                if (currentQty < item.initialStock) {
                    state.cart = { ...state.cart, [id]: currentQty + 1 };
                }
            };

            const removeFromCart = (id) => {
                const currentQty = state.cart[id] || 0;
                if (currentQty > 0) {
                    const newCart = { ...state.cart };
                    newCart[id]--;
                    if (newCart[id] === 0) delete newCart[id];
                    state.cart = newCart;
                }
            };

            // --- Component Pattern Rendering ---
            
            const renderFeatured = () => {
                const featured = inventoryList.find(i => i.isFeatured);
                if (!featured) return;

                const inCart = state.cart[featured.id] || 0;
                const stock = featured.initialStock - inCart;
                const isOut = stock === 0;
                const breathingClass = inCart > 0 ? 'breathing' : '';

                DOM.featuredArea.innerHTML = `
                    <div class="glass-card h-full p-8 md:p-12 relative overflow-hidden flex flex-col justify-between ${breathingClass}">
                        <div class="absolute -right-10 -top-10 opacity-[0.04] pointer-events-none text-[var(--color-accent)]">
                            <i data-lucide="flower-2" style="width: 320px; height: 320px;"></i>
                        </div>
                        
                        <div class="relative z-10 flex-grow">
                            <div class="inline-block px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest accent-bg mb-6 shadow-sm">
                                Featured Bloom
                            </div>
                            <h2 class="text-4xl md:text-6xl font-serif font-bold mb-4 tracking-tight">${featured.name}</h2>
                            <p class="text-lg opacity-80 max-w-xl leading-relaxed font-light">${featured.description}</p>
                        </div>
                        
                        <div class="relative z-10 mt-10 flex flex-wrap items-center justify-between gap-6 border-t border-[var(--color-glass-border)] pt-8">
                            <div>
                                <span class="text-4xl font-sans font-light tracking-tight">$${featured.price.toFixed(2)}</span>
                                <span class="block mt-1 text-sm font-semibold uppercase tracking-widest ${isOut ? 'text-red-500' : 'opacity-60'}">
                                    ${isOut ? 'Out of Stock' : `${stock} Stems Remaining`}
                               </span>
                            </div>
                            
                            <button onclick="App.addToCart('${featured.id}')" ${isOut ? 'disabled' : ''} 
                                    class="accent-bg px-8 py-4 rounded-2xl font-bold uppercase tracking-wider flex items-center gap-3 hover:scale-[1.02] transition-transform active:scale-95 ${isOut ? 'opacity-50 cursor-not-allowed hover:scale-100' : 'shadow-lg'}">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                                Add to Arrangement
                            </button>
                        </div>
                    </div>
                `;
            };

            const renderInventory = () => {
                // High performance array filtering
                const items = inventoryList.filter(item => 
                    !item.isFeatured && item.name.toLowerCase().includes(state.searchQuery)
                );

                DOM.inventoryArea.innerHTML = items.map(item => {
                    const inCart = state.cart[item.id] || 0;
                    const stock = item.initialStock - inCart;
                    const isOut = stock === 0;
                    const breathingClass = inCart > 0 ? 'breathing' : '';

                    return `
                        <div class="glass-card p-7 flex flex-col h-full ${breathingClass} border-[1px] border-transparent hover:border-[var(--color-glass-border)] transition-all">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="font-serif text-2xl font-semibold tracking-tight">${item.name}</h3>
                                <span class="font-sans text-lg font-light opacity-90">$${item.price.toFixed(2)}</span>
                            </div>
                            <p class="text-sm opacity-70 flex-grow mb-8 font-light leading-relaxed">${item.description}</p>
                            
                            <div class="flex items-center justify-between border-t border-[var(--color-glass-border)] pt-5 mt-auto">
                                <span class="text-xs font-bold uppercase tracking-widest ${isOut ? 'text-red-500' : 'opacity-60'}">
                                    ${isOut ? 'Out of Stock' : `${stock} Left`}
                               </span>
                                
                                <button onclick="App.addToCart('${item.id}')" ${isOut ? 'disabled' : ''} 
                                        class="w-12 h-12 rounded-full flex items-center justify-center accent-bg hover:scale-105 transition-transform shadow-md ${isOut ? 'opacity-50 cursor-not-allowed hover:scale-100' : ''}">
                                    <i data-lucide="plus" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            };

            const renderReceipt = () => {
                let subtotal = 0;
                let uniqueTypes = 0;
                let delay = 0;

                const cartItemsHTML = Object.entries(state.cart).map(([id, qty]) => {
                    if (qty > 0) {
                        const item = inventoryList.find(i => i.id === id);
                        subtotal += item.price * qty;
                        uniqueTypes++;
                        
                        const html = `
                            <div class="flex justify-between items-center slide-in-item py-4 border-b border-[var(--color-glass-border)] last:border-0" style="animation-delay: ${delay}s; opacity: 0;">
                                <div class="flex items-center gap-5">
                                    <div class="flex flex-col items-center bg-[var(--color-glass-bg)] border border-[var(--color-glass-border)] rounded-lg p-1 shadow-sm">
                                        <button onclick="App.addToCart('${id}')" class="opacity-50 hover:opacity-100 hover:text-[var(--color-accent)] transition-all p-1"><i data-lucide="chevron-up" class="w-3 h-3"></i></button>
                                        <span class="font-sans font-semibold text-sm w-6 text-center">${qty}</span>
                                        <button onclick="App.removeFromCart('${id}')" class="opacity-50 hover:opacity-100 text-red-400 transition-all p-1"><i data-lucide="chevron-down" class="w-3 h-3"></i></button>
                                    </div>
                                    <div>
                                        <h4 class="font-serif font-semibold text-lg tracking-tight">${item.name}</h4>
                                        <span class="text-xs opacity-60 uppercase tracking-widest font-medium">@ $${item.price.toFixed(2)}</span>
                                    </div>
                                </div>
                                <span class="font-sans font-medium text-lg">$${(item.price * qty).toFixed(2)}</span>
                            </div>
                        `;
                        delay += 0.04; // Stagger effect
                        return html;
                    }
                    return '';
                }).join('');

                if (uniqueTypes === 0) {
                    DOM.receiptItems.innerHTML = `
                        <div class="h-full flex flex-col items-center justify-center opacity-30 text-center space-y-5 py-12">
                            <i data-lucide="shopping-bag" class="w-16 h-16"></i>
                            <p class="font-serif text-xl italic">Your arrangement awaits its first bloom.</p>
                        </div>
                    `;
                } else {
                    DOM.receiptItems.innerHTML = cartItemsHTML;
                }

                // --- The Smart Fee Logic ---
                let complexityPremium = 0;
                if (uniqueTypes > 3) {
                    complexityPremium = subtotal * 0.10;
                }
                const total = subtotal + complexityPremium;

                // Render Totals
                DOM.receiptTotals.innerHTML = `
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between items-center text-sm opacity-70 font-medium tracking-wide">
                            <span>Subtotal</span>
                            <span>$${subtotal.toFixed(2)}</span>
                        </div>
                        ${complexityPremium > 0 ? `
                        <div class="flex justify-between items-center text-sm accent-text font-bold slide-in-item tracking-wide">
                            <span class="flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i> Complexity Premium (10%)</span>
                            <span>+$${complexityPremium.toFixed(2)}</span>
                        </div>
                        ` : ''}
                    </div>
                    <div class="flex justify-between items-end border-t border-[var(--color-glass-border)] pt-6 mb-8">
                        <span class="text-xl font-serif font-bold uppercase tracking-widest">Total</span>
                        <span class="text-5xl font-sans font-light accent-text tracking-tighter">$${total.toFixed(2)}</span>
                    </div>
                    <button class="w-full accent-bg py-5 rounded-2xl font-bold uppercase tracking-widest hover:opacity-90 transition-all flex justify-center items-center gap-3 shadow-lg active:scale-95 ${total === 0 ? 'opacity-50 cursor-not-allowed hover:scale-100' : ''}">
                        <i data-lucide="check-circle" class="w-5 h-5"></i>
                        Confirm Order
                    </button>
                `;

                // --- The VIP Packaging Logic ---
                if (total > 150) {
                    DOM.body.classList.add('vip-mode');
                    DOM.vipBadge.classList.remove('hidden');
                    DOM.vipBadge.classList.add('flex');
                } else {
                    DOM.body.classList.remove('vip-mode');
                    DOM.vipBadge.classList.add('hidden');
                    DOM.vipBadge.classList.remove('flex');
                }

                // Re-initialize icons for newly injected HTML
                lucide.createIcons({ root: DOM.receiptItems });
                lucide.createIcons({ root: DOM.receiptTotals });
            };

            const render = () => {
                renderFeatured();
                renderInventory();
                renderReceipt();
                // Ensure icons in featured and inventory are rendered
                lucide.createIcons({ root: DOM.featuredArea });
                lucide.createIcons({ root: DOM.inventoryArea });
            };

            // Bootstrap App
            const init = () => {
                render();
            };

            // Expose public API
            return { init, addToCart, removeFromCart };
        })();

        // Run the application
        App.init();
    </script>
</body>
</html>
